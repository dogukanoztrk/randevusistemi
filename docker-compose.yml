services:
  # ========================================================
  # Backend: FastAPI Application with SQLite Persistence
  # ========================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dita-backend
    ports:
      - "8001:8001"
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistent data storage for SQLite and JSON seeds
      - dita-data:/app/data
      - ./backend/dita_appointments.db:/app/dita_appointments.db
      - ./backend/dita_sectors.json:/app/dita_sectors.json
      - ./backend/dita_staff.json:/app/dita_staff.json
      - ./backend/dita_companies.json:/app/dita_companies.json
      - ./backend/app:/app/app
    networks:
      - dita-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/sectors')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ========================================================
  # Frontend: Vue.js Application served via Nginx Proxy
  # ========================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dita-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    volumes: []
    environment:
      - TZ=Europe/Istanbul
    networks:
      - dita-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

# ========================================================
# Infrastructure: Networks and Volumes
# ========================================================
networks:
  dita-network:
    name: dita-network
    driver: bridge

volumes:
  dita-data:
    name: dita-data
    driver: local
